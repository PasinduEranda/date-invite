<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>A Special Invitation ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #0f0f0f, #1b1024, #2b0f1d);
    overflow: hidden;
    color: white;
    position: relative;
}

/* Background */
.stars {
    position: absolute;
    width: 100%;
    height: 100%;
    background-image: radial-gradient(white 1px, transparent 1px);
    background-size: 40px 40px;
    opacity: .15;
}

.glow {
    position: absolute;
    width: 300px;
    height: 300px;
    border-radius: 50%;
    filter: blur(120px);
}

.glow1 {
    background: #ff4d8d;
    top: -100px;
    left: -100px;
}

.glow2 {
    background: #7b2cbf;
    bottom: -100px;
    right: -100px;
}

/* Card */
.card {
    position: relative;
    width: 90%;
    max-width: 700px;
    padding: 40px;
    text-align: center;
    background: rgba(255, 255, 255, .08);
    backdrop-filter: blur(25px);
    border: 1px solid rgba(255, 255, 255, .15);
    border-radius: 35px;
    box-shadow:
        0 25px 50px rgba(0, 0, 0, .4),
        0 0 50px rgba(255, 77, 141, .15);
    z-index: 10;
    animation: fadeIn 1s ease;
}

h1 {
    font-family: 'Playfair Display', serif;
    font-size: 2rem;
    margin-bottom: 15px;
}

.subtitle {
    color: #d7d7d7;
    line-height: 1.8;
    margin-bottom: 30px;
}

button {
    border: none;
    cursor: pointer;
    padding: 16px 35px;
    border-radius: 50px;
    margin: 10px;
    font-size: 16px;
    font-weight: 600;
    transition: .3s;
}

button:disabled {
    cursor: not-allowed;
    opacity: .75;
}

.yes {
    background: linear-gradient(135deg, #ff4d8d, #ff7096);
    color: white;
}

.yes:hover {
    transform: translateY(-4px) scale(1.05);
}

.no {
    background: rgba(255, 255, 255, .1);
    color: white;
    border: 1px solid rgba(255, 255, 255, .15);
}

input {
    width: 100%;
    padding: 15px;
    margin: 10px 0;
    border: none;
    border-radius: 15px;
    background: rgba(255, 255, 255, .08);
    color: white;
    font-size: 15px;
}

input::placeholder {
    color: #d1d1d1;
}

@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

@keyframes float {
    from {
        transform: translateY(0);
        opacity: 1;
    }
    to {
        transform: translateY(-110vh);
        opacity: 0;
    }
}
</style>
</head>

<body>

<div class="stars"></div>
<div class="glow glow1"></div>
<div class="glow glow2"></div>

<div class="card" id="card">

    <h1>Hey June ❤️</h1>

    <p class="subtitle">
        If I promised good conversations,
        lots of smiles,
        and a wonderful evening...
        <br><br>
        Would you go on a date with me? ❤️
    </p>

    <div id="buttonArea">
        <button class="yes" id="yesBtn">❤️ Yes, I'd Love To</button>
        <button class="no" id="noBtn">😅 No</button>
    </div>

</div>

<script>

const noBtn = document.getElementById("noBtn");
const yesBtn = document.getElementById("yesBtn");

let yesScale = 1;
let heartStarted = false;

/* NO BUTTON MOVES */
function moveButton() {

    const card = document.getElementById("card");
    const rect = card.getBoundingClientRect();

    const btnRect = noBtn.getBoundingClientRect();

    // keep movement INSIDE card only
    const maxX = rect.width - btnRect.width - 20;
    const maxY = rect.height - btnRect.height - 20;

    const x = Math.random() * maxX;
    const y = Math.random() * maxY;

    // IMPORTANT: keep it inside card, not whole screen
    noBtn.style.position = "absolute";
    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";

    // optional fun scaling effect
    yesScale += 0.08;
    yesBtn.style.transform = `scale(${yesScale})`;
}

noBtn.addEventListener("mouseover", moveButton);
noBtn.addEventListener("click", moveButton);

/* YES CLICK */
yesBtn.addEventListener("click", () => {

    document.getElementById("card").innerHTML = `

        <h1>Yay ❤️</h1>

        <p class="subtitle">
            You just made my day ✨
            <br><br>
            Now let's plan our special date together.
        </p>

        <input id="location" placeholder="📍 Where should we go?">
        <input id="date" type="date">
        <input id="time" type="time">
        <input id="plan" placeholder="🍽️ Dinner, Coffee, Movie...">

        <button class="yes" id="sendBtn" onclick="sendData()">Send Our Plan ❤️</button>

    `;
});

/* SEND DATA */
async function sendData() {

    const location = document.getElementById("location").value;
    const date = document.getElementById("date").value;
    const time = document.getElementById("time").value;
    const plan = document.getElementById("plan").value;
    const sendBtn = document.getElementById("sendBtn");

    if (!location || !date || !time || !plan) {
        alert("Please fill all fields ❤️");
        return;
    }

    sendBtn.disabled = true;
    sendBtn.textContent = "Sending Our Plan...";

    try {
        const response = await fetch("https://date-invite-production.up.railway.app/send", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ location, date, time, plan })
        });
        

        const result = await response.json();
        console.log("Server response:", result);

        if (result.success) {
            showFinalScreen();
            alert("Data sent successfully");
        } else {
            sendBtn.disabled = false;
            sendBtn.textContent = "Send Our Plan ❤️";
            alert("Something went wrong 😢");
        }

    } catch (error) {
        console.log(error);
        sendBtn.disabled = false;
        sendBtn.textContent = "Send Our Plan ❤️";
        alert("Failed to send 😢");
    }
}

/* FINAL SCREEN */
function showFinalScreen() {

    document.getElementById("card").innerHTML = `

        <h1>❤️ It's A Date ❤️</h1>

        <p class="subtitle">
            Thank you for saying yes...
            <br><br>
            I didn’t just plan a date —
            I planned a memory with you ✨
            <br><br>
            I can't wait to see you ❤️
        </p>

        <p style="margin-top:20px;color:#ffb3c6;">
            — See you soon ❤️
        </p>

    `;

    startHearts();
}

/* HEART EFFECT */
function startHearts() {

    if (heartStarted) return;
    heartStarted = true;

    setInterval(() => {

        const heart = document.createElement("div");
        heart.innerHTML = "❤️";

        heart.style.position = "absolute";
        heart.style.left = Math.random() * window.innerWidth + "px";
        heart.style.bottom = "-20px";
        heart.style.fontSize = (20 + Math.random() * 20) + "px";
        heart.style.animation = "float 4s linear forwards";

        document.body.appendChild(heart);

        setTimeout(() => heart.remove(), 4000);

    }, 300);
}

</script>

</body>
</html>
